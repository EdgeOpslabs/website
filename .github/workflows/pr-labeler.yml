name: PR Labeler

# Automatically applies area and type labels to pull requests based on
# which files were changed. Runs on opened, synchronised, and reopened PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    name: Label PR by changed files
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Auto-label based on file paths
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const existingLabels = pr.labels?.map(l => l.name) ?? [];
            const labelsToAdd    = new Set();

            // Fetch changed files (max 100; enough for typical PRs)
            const { data: files } = await github.rest.pulls.listFiles({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: pr.number,
              per_page:    100,
            });

            const filenames = files.map(f => f.filename);
            const anyMatch  = (re) => filenames.some(f => re.test(f));
            const need      = (label) => {
              if (!existingLabels.includes(label)) labelsToAdd.add(label);
            };

            // ── Landing page changes ───────────────────────────────────────
            if (anyMatch(/^components\/landing\//)) {
              need('area:landing');
            }

            // ── Community page changes ─────────────────────────────────────
            if (anyMatch(/^(components\/community\/|app\/community\/)/)) {
              need('area:community');
            }

            // ── About page changes ─────────────────────────────────────────
            if (anyMatch(/^(components\/about\/|app\/about\/)/)) {
              need('area:about');
            }

            // ── Products page changes ──────────────────────────────────────
            if (anyMatch(/^app\/products\//)) {
              need('area:products');
            }

            // ── Legal page changes ─────────────────────────────────────────
            if (anyMatch(/^(components\/legal\/|app\/(terms|privacy|code-of-conduct)\/)/)) {
              need('area:legal');
            }

            // ── API route changes ──────────────────────────────────────────
            if (anyMatch(/^app\/api\//)) {
              need('area:api');
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:enhancement');
            }

            // ── App layout / root app changes ─────────────────────────────
            if (anyMatch(/^app\/(layout|globals|page)\.(tsx|css|ts)$/)) {
              need('area:landing');
            }

            // ── Shared / layout components ─────────────────────────────────
            if (anyMatch(/^components\/layout\//)) {
              need('area:landing');
            }

            // ── Shared lib, types, utils ───────────────────────────────────
            if (anyMatch(/^lib\//)) {
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:chore');
            }

            // ── Config data files ──────────────────────────────────────────
            if (anyMatch(/^config\//)) {
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:chore');
            }

            // ── Public assets ──────────────────────────────────────────────
            if (anyMatch(/^public\//)) {
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:chore');
            }

            // ── Infrastructure (.github, scripts, config files) ────────────
            if (
              anyMatch(/^\.github\//) ||
              anyMatch(/^(package\.json|package-lock\.json|bun\.lock|tsconfig|next\.config|eslint\.config|postcss\.config)/)
            ) {
              need('area:infrastructure');
              const hasType = existingLabels.some(l => l.startsWith('type:'));
              if (!hasType) need('type:chore');
            }

            // ── Documentation (README, CONTRIBUTING, markdown files) ───────
            if (
              anyMatch(/^(README|CONTRIBUTING|CONTRIBUTORS|LICENSE)(\..+)?$/) ||
              anyMatch(/\.md$/)
            ) {
              need('type:documentation');
            }

            // ── Infer type from PR title if still unset ────────────────────
            const title = pr.title ?? '';
            if (!existingLabels.some(l => l.startsWith('type:')) && labelsToAdd.size > 0) {
              if (/^\[BUG\]/i.test(title))                     need('type:bug');
              else if (/^\[(FEAT|FEATURE)\]/i.test(title))     need('type:feature');
              else if (/^\[ENHANCEMENT\]/i.test(title))        need('type:enhancement');
              else if (/^\[DOCS\]/i.test(title))               need('type:documentation');
              else if (/^\[CHORE\]/i.test(title))              need('type:chore');
              else if (/^\[PERF\]/i.test(title))               need('type:performance');
              else if (/^\[A11Y\]/i.test(title))               need('type:accessibility');
              else if (/^\[SECURITY\]/i.test(title))           need('type:security');
            }

            // ── Default status label ───────────────────────────────────────
            const hasStatus = existingLabels.some(l => l.startsWith('status:'));
            if (!hasStatus) need('status:triage');

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.number,
                labels:       [...labelsToAdd],
              });
              core.info(`Added labels: ${[...labelsToAdd].join(', ')}`);
            } else {
              core.info('No new labels to apply');
            }
